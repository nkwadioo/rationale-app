<header class="sticky top-0 z-50">
    <nav class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="#home" class="flex items-center gap-3" (click)="closeMenu()">
                <!-- <div class="w-10 h-10 bg-orange-500 flex items-center justify-center font-bold text-white text-xl">R</div> -->
                 <img src="/images/logo.svg" alt="logo" class="h-[40px]" srcset="">
                <div class="leading-tight">
                    <p class="text-xl font-bold tracking-tight dark:text-white">RATIONALE</p>
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-500 dark:text-slate-400 font-medium">Built Environment Consultants</p>
                </div>
            </a>

            <div class="hidden md:flex items-center gap-8 text-sm font-semibold uppercase tracking-[0.15em]">
                <a class="nav-link text-slate-700 dark:text-slate-200 hover:text-orange-500 dark:hover:text-orange-400 transition-colors" href="#about">About</a>
                <a class="nav-link text-slate-700 dark:text-slate-200 hover:text-orange-500 dark:hover:text-orange-400 transition-colors" href="#services">Services</a>
                <a class="nav-link text-slate-700 dark:text-slate-200 hover:text-orange-500 dark:hover:text-orange-400 transition-colors" href="#projects">Projects</a>
                <a
                    class="px-6 py-2.5 bg-orange-500 text-white text-sm font-bold skew-box hover:brightness-110 transition-all"
                    href="#contact"
                >
                    GET IN TOUCH
                </a>
                <button
                    type="button"
                    class="p-2 text-slate-500 hover:text-orange-500 transition-colors"
                    aria-label="Toggle dark mode"
                    (click)="toggleDarkMode()"
                >
                    <span class="material-symbols-outlined">contrast</span>
                </button>
            </div>

            <button
                type="button"
                class="md:hidden inline-flex items-center justify-center p-2 rounded-md border border-slate-300 dark:border-slate-800 text-slate-700 dark:text-slate-200 hover:border-orange-400"
                aria-label="Toggle navigation"
                (click)="toggleMenu()"
            >
                <span class="material-symbols-outlined text-3xl" aria-hidden="true">menu</span>
            </button>
        </div>

        @if (menuOpen()) {
            <div class="md:hidden border-t border-slate-200 dark:border-slate-900 bg-white/95 dark:bg-slate-950/95 px-6 pb-6 space-y-2">
                <a class="block py-3 font-semibold uppercase tracking-[0.2em] text-slate-700 dark:text-slate-200 hover:text-orange-500" href="#about" (click)="closeMenu()">About</a>
                <a class="block py-3 font-semibold uppercase tracking-[0.2em] text-slate-700 dark:text-slate-200 hover:text-orange-500" href="#services" (click)="closeMenu()">Services</a>
                <a class="block py-3 font-semibold uppercase tracking-[0.2em] text-slate-700 dark:text-slate-200 hover:text-orange-500" href="#projects" (click)="closeMenu()">Projects</a>
                <a class="block py-3 font-semibold uppercase tracking-[0.2em] text-slate-700 dark:text-slate-200 hover:text-orange-500" href="#contact" (click)="closeMenu()">Contact</a>
                <a class="block mt-2 px-4 py-3 text-center bg-orange-500 text-white font-bold skew-box" href="#contact" (click)="closeMenu()">GET IN TOUCH</a>
                <button
                    type="button"
                    class="mt-2 flex items-center gap-2 py-3 text-slate-500 hover:text-orange-500 transition-colors"
                    (click)="toggleDarkMode()"
                >
                    <span class="material-symbols-outlined">contrast</span>
                    <span class="text-sm font-semibold uppercase tracking-[0.2em]">{{ isDark() ? 'Light Mode' : 'Dark Mode' }}</span>
                </button>
            </div>
        }
    </nav>
</header>
